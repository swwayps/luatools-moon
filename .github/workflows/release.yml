name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist on origin)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends luajit zip unzip

      - name: Build plugin and zip
        run: scripts/build.sh --zip

      - name: Verify artifact
        run: |
          test -f dist/luatools-linux.zip
          unzip -l dist/luatools-linux.zip | head -20

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/luatools-linux.zip --clobber
          else
            gh release create "$tag" dist/luatools-linux.zip \
              --title "$tag" \
              --generate-notes
          fi
